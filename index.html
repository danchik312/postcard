<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на День Рождения</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #0f172a;
            font-family: 'Montserrat', sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #scene {
            position: relative;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        canvas#confetti-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(234, 179, 8, 0.3);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1.5s ease-out;
            width: 100%;
        }

        .gold-accent {
            color: #eab308;
            font-family: 'Playfair Display', serif;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(-20px); opacity: 0.6; }
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #eab308, transparent);
            margin: 25px 0;
        }

        .btn-confirm {
            background: #eab308;
            color: #0f172a;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            margin-top: 20px;
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
        }

        .btn-confirm:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.4);
            background: #facc15;
        }

        .info-block { margin: 15px 0; }
        .info-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        .info-value { font-size: 1.2rem; font-weight: 600; }

        .location-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #eab308;
            text-decoration: none;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: opacity 0.3s;
        }
        .location-link:hover { opacity: 0.8; }

        #confirmation-msg {
            display: none;
            margin-top: 20px;
            color: #4ade80;
            font-weight: 600;
            font-size: 16px;
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div id="scene">
    <div class="sparkle" style="top:10%;left:10%;width:4px;height:4px;animation-delay:0s;"></div>
    <div class="sparkle" style="top:20%;right:15%;width:6px;height:6px;background:#eab308;animation-delay:1s;"></div>
    <div class="sparkle" style="bottom:15%;left:20%;width:3px;height:3px;animation-delay:2s;"></div>
    <div class="sparkle" style="bottom:10%;right:25%;width:5px;height:5px;background:#eab308;animation-delay:1.5s;"></div>

    <div class="card">
        <h2 style="font-size:11px;letter-spacing:0.3em;text-transform:uppercase;color:#94a3b8;margin-bottom:12px;">Приглашение на мой</h2>
        <h1 class="gold-accent" style="font-size:48px;margin-bottom:8px;">День Рождения!</h1>
        <p style="color:#cbd5e1;font-style:italic;margin-bottom:20px;">Буду рад разделить этот особенный вечер с тобой❤️</p>

        <div class="divider"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;">
            <div class="info-block" style="border-right:1px solid #334155;">
                <div class="info-label">Дата</div>
                <div class="info-value">23 Марта</div>
            </div>
            <div class="info-block">
                <div class="info-label">Время</div>
                <div class="info-value">19:00</div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="info-block" style="margin-top:12px;">
            <div class="info-label">Место проведения</div>
            <div class="info-value" style="margin-bottom:4px;">Ресторан Batumi</div>
            <div style="font-size:13px;color:#64748b;">ул. Саякбая Каралаева 13/11a</div>
            <a class="location-link" href="https://2gis.kg/bishkek/search/Саякбая%20Каралаева%2013%2F11a" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10zm0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6z"/>
                </svg>
                Открыть в картах
            </a>
        </div>

        <div class="divider"></div>

        <div style="padding:8px 0;">
            <button class="btn-confirm" id="btn" onclick="boom()">Я приду!</button>
            <div id="confirmation-msg">Ураааа, жду тебя! ✨</div>
        </div>

        <p style="margin-top:16px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:0.4em;">До встречи на празднике</p>
    </div>
</div>

<script>
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let pieces = [];
let fireworks = [];
let animating = false;

const COLORS = ['#eab308','#facc15','#f97316','#ef4444','#a855f7','#3b82f6','#10b981','#ec4899','#ffffff','#fde68a'];

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function Piece(x, y) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*16;
    this.vy = -Math.random()*20 - 6;
    this.r = Math.random()*7+3;
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.rot = Math.random()*360;
    this.rotV = (Math.random()-0.5)*14;
    this.type = Math.floor(Math.random()*3);
    this.life = 1;
}

Piece.prototype.update = function() {
    this.vy += 0.45;
    this.vx *= 0.99;
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.rotV;
    this.life -= 0.007;
};

Piece.prototype.draw = function(c) {
    c.save();
    c.globalAlpha = Math.max(0, this.life);
    c.fillStyle = this.color;
    c.translate(this.x, this.y);
    c.rotate(this.rot * Math.PI/180);
    if(this.type === 0) {
        c.fillRect(-this.r, -this.r/2, this.r*2, this.r);
    } else if(this.type === 1) {
        c.beginPath(); c.arc(0,0,this.r,0,Math.PI*2); c.fill();
    } else {
        c.beginPath();
        for(let i=0;i<5;i++){
            c.lineTo(Math.cos((18+i*72)*Math.PI/180)*this.r, -Math.sin((18+i*72)*Math.PI/180)*this.r);
            c.lineTo(Math.cos((54+i*72)*Math.PI/180)*this.r*0.4, -Math.sin((54+i*72)*Math.PI/180)*this.r*0.4);
        }
        c.closePath(); c.fill();
    }
    c.restore();
};

function Firework(x) {
    this.x = x;
    this.y = canvas.height;
    this.vy = -Math.random()*7 - 5;
    this.vx = (Math.random()-0.5)*3;
    this.trail = [];
    this.exploded = false;
    this.explodeY = canvas.height * (0.15 + Math.random()*0.45);
    this.color = COLORS[Math.floor(Math.random()*COLORS.length)];
    this.particles = [];
    this.done = false;
}

Firework.prototype.update = function() {
    if(!this.exploded) {
        this.trail.push({x:this.x, y:this.y});
        if(this.trail.length > 10) this.trail.shift();
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.12;
        if(this.y <= this.explodeY) {
            this.exploded = true;
            const n = 40 + Math.floor(Math.random()*24);
            for(let i=0;i<n;i++){
                const angle = (i/n)*Math.PI*2;
                const speed = Math.random()*6+2;
                this.particles.push({
                    x:this.x, y:this.y,
                    vx:Math.cos(angle)*speed,
                    vy:Math.sin(angle)*speed,
                    life:1, r:Math.random()*3+1,
                    color:COLORS[Math.floor(Math.random()*COLORS.length)]
                });
            }
        }
    } else {
        let alive = false;
        for(let p of this.particles){
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.09; p.vx *= 0.97;
            p.life -= 0.013;
            if(p.life > 0) alive = true;
        }
        if(!alive) this.done = true;
    }
};

Firework.prototype.draw = function(c) {
    if(!this.exploded){
        for(let i=0;i<this.trail.length;i++){
            c.globalAlpha = (i/this.trail.length)*0.7;
            c.fillStyle = this.color;
            c.beginPath(); c.arc(this.trail[i].x, this.trail[i].y, 2,0,Math.PI*2); c.fill();
        }
        c.globalAlpha = 1;
        c.fillStyle = '#ffffff';
        c.beginPath(); c.arc(this.x, this.y, 3,0,Math.PI*2); c.fill();
    } else {
        for(let p of this.particles){
            c.globalAlpha = Math.max(0, p.life);
            c.fillStyle = p.color;
            c.beginPath(); c.arc(p.x, p.y, p.r,0,Math.PI*2); c.fill();
        }
    }
    c.globalAlpha = 1;
};

function loop() {
    if(!animating) return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces = pieces.filter(p => p.life > 0);
    for(let p of pieces){ p.update(); p.draw(ctx); }
    fireworks = fireworks.filter(f => !f.done);
    for(let f of fireworks){ f.update(); f.draw(ctx); }
    if(pieces.length === 0 && fireworks.length === 0){ animating = false; return; }
    requestAnimationFrame(loop);
}

function boom() {
    document.getElementById('btn').style.display = 'none';
    document.getElementById('confirmation-msg').style.display = 'block';
    animating = true;

    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    for(let i=0;i<150;i++) pieces.push(new Piece(cx+(Math.random()-0.5)*80, cy));
    for(let i=0;i<60;i++) pieces.push(new Piece(cx-120+(Math.random()-0.5)*40, cy+40));
    for(let i=0;i<60;i++) pieces.push(new Piece(cx+120+(Math.random()-0.5)*40, cy+40));

    let fw = 0;
    const iv = setInterval(() => {
        fireworks.push(new Firework(canvas.width*(0.15 + Math.random()*0.7)));
        fw++;
        if(fw >= 14) clearInterval(iv);
    }, 300);

    loop();
}
</script>
</body>
</html>
